<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEE Mining Atlas v4.7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#020810;--bg2:#040d18;--bg3:#071525;
  --surface:#0a1d30;--surface2:#0f2640;
  --border:#1a3f60;--border2:#2a5f88;
  --gold:#e8a020;--gold2:#ffcc55;
  --cyan:#00c8e8;--cyan2:#55eeff;
  --red:#e83030;--green:#20e880;--purple:#cc44ff;
  --orange:#ff8c00;--yellow:#ffe066;
  --text:#a8cce0;--text2:#c8dde8;--textdim:#4a7090;
  --radius:4px;
}
body{background:var(--bg);color:var(--text2);font-family:'Rajdhani',sans-serif;font-size:15px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,180,230,0.015) 2px,rgba(0,180,230,0.015) 4px)}
#grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,180,230,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,230,0.03) 1px,transparent 1px);background-size:40px 40px}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#071a30 0%,#020810 70%)}
.login-box{width:380px;border:1px solid var(--border2);background:var(--bg2);padding:36px;position:relative}
.login-box::before,.login-box::after{content:'';position:absolute;width:14px;height:14px;border-color:var(--gold);border-style:solid}
.login-box::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.login-box::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.login-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--gold);letter-spacing:3px;text-align:center;margin-bottom:4px;text-shadow:0 0 20px rgba(232,160,32,.5)}
.login-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim);letter-spacing:4px;text-align:center;margin-bottom:24px}
.field-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim);letter-spacing:3px;display:block;margin-bottom:5px}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:13px;padding:9px 12px;outline:none;margin-bottom:14px;border-radius:var(--radius)}
.field-input:focus{border-color:var(--cyan)}
.login-err{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);text-align:center;min-height:18px;margin-bottom:10px}
.btn-login{width:100%;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;padding:12px;cursor:pointer;transition:all .2s}
.btn-login:hover{background:var(--gold);color:#000}

/* APP SHELL */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1;display:none}
#header{height:52px;flex-shrink:0;border-bottom:1px solid var(--border);background:rgba(4,13,24,.98);display:flex;align-items:center;padding:0 20px;gap:16px}
.header-logo{font-family:'Orbitron',monospace;font-weight:900;font-size:13px;color:var(--gold);letter-spacing:2px;white-space:nowrap;text-shadow:0 0 10px rgba(232,160,32,.4)}
.header-logo span{color:var(--cyan);font-size:10px;font-weight:400;margin-left:6px;letter-spacing:3px}
.header-sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.nav-tab{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;padding:0 14px;height:38px;display:flex;align-items:center;cursor:pointer;color:var(--textdim);border:1px solid transparent;transition:all .2s;background:transparent;border-radius:var(--radius)}
.nav-tab:hover{color:var(--text2);border-color:var(--border)}
.nav-tab.active{color:var(--cyan);border-color:var(--border2);background:rgba(0,200,232,.05)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.user-name{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--textdim)}
.btn-sm{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--textdim);background:transparent;border:1px solid var(--border);padding:4px 10px;cursor:pointer;transition:all .2s;border-radius:var(--radius)}
.btn-sm:hover{color:var(--red);border-color:var(--red)}

/* MAIN */
#main{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;padding:20px;display:none}
.panel.active{display:block}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sec-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:3px}
.sec-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim);background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:20px}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.btn-gold{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:6px 14px;cursor:pointer;transition:all .2s;border-radius:var(--radius)}
.btn-gold:hover{background:var(--gold);color:#000}
.btn-cyan{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);padding:6px 14px;cursor:pointer;transition:all .2s;border-radius:var(--radius)}
.btn-cyan:hover{background:var(--cyan);color:#000}

/* FILTERS ROW */
.filters-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-input{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:12px;padding:7px 10px;outline:none;border-radius:var(--radius);flex:1;min-width:120px}
.filter-input:focus{border-color:var(--cyan)}
.filter-select{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:12px;padding:7px 10px;outline:none;border-radius:var(--radius);cursor:pointer}
.filter-select:focus{border-color:var(--cyan)}

/* LOCATION CARDS */
.loc-grid{display:flex;flex-direction:column;gap:12px}
.loc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.loc-card:hover{border-color:var(--border2)}
.loc-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none}
.loc-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.loc-icon.planet{background:rgba(0,200,232,.15);border:1px solid var(--cyan)}
.loc-icon.moon{background:rgba(232,160,32,.1);border:1px solid var(--gold)}
.loc-icon.asteroid{background:rgba(204,68,255,.1);border:1px solid var(--purple)}
.loc-info{flex:1}
.loc-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--text2);letter-spacing:1px}
.loc-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim);margin-top:2px}
.loc-mineral-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.mineral-pill{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid var(--border2);color:var(--text);background:rgba(0,200,232,.05)}
.loc-stats{display:flex;gap:12px;align-items:center;margin-left:auto;flex-shrink:0}
.loc-stat{text-align:center}
.loc-stat-val{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--cyan)}
.loc-stat-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--textdim);letter-spacing:1px}
.loc-chevron{color:var(--textdim);font-size:12px;transition:transform .2s;margin-left:8px}
.loc-card.expanded .loc-chevron{transform:rotate(180deg)}
.loc-body{display:none;border-top:1px solid var(--border);padding:14px 16px}
.loc-card.expanded .loc-body{display:block}

/* MINERAL TABLE IN LOCATION */
.min-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.min-table th{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--textdim);text-align:left;padding:4px 8px;border-bottom:1px solid var(--border)}
.min-table td{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);padding:5px 8px;border-bottom:1px solid rgba(26,63,96,.5)}
.min-table tr:last-child td{border-bottom:none}
.min-table tr:hover td{background:rgba(0,200,232,.04)}
.min-name{color:var(--cyan2);font-weight:600}
.min-actions{display:flex;gap:6px;margin-top:10px}
.btn-xs{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;background:transparent;border:1px solid var(--border);color:var(--textdim);padding:4px 10px;cursor:pointer;transition:all .2s;border-radius:var(--radius)}
.btn-xs:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-xs.danger:hover{border-color:var(--red);color:var(--red)}
.loc-notes{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--textdim);margin-top:8px;font-style:italic}

/* MINERAL SEARCH */
.search-results{display:flex;flex-direction:column;gap:8px}
.search-result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;gap:12px;align-items:flex-start}
.sr-mineral{font-family:'Orbitron',monospace;font-size:12px;color:var(--cyan);font-weight:700;min-width:100px}
.sr-locations{flex:1}
.sr-loc-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid rgba(26,63,96,.4)}
.sr-loc-row:last-child{border-bottom:none}
.sr-loc-name{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);flex:1}
.sr-loc-type{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--textdim);letter-spacing:1px}
.sr-conc{font-family:'Orbitron',monospace;font-size:11px;color:var(--gold);font-weight:600}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--textdim)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.empty-title{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:3px;color:var(--textdim);margin-bottom:6px}
.empty-sub{font-family:'Share Tech Mono',monospace;font-size:11px}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(2,8,16,.8);z-index:500;display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);width:560px;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.modal::before,.modal::after{content:'';position:absolute;width:12px;height:12px;border-color:var(--gold);border-style:solid}
.modal::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.modal::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.modal-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:3px;margin-bottom:20px}
.modal-section{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--cyan);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.form-row{display:flex;gap:10px;margin-bottom:10px}
.form-group{flex:1}
.form-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim);letter-spacing:2px;display:block;margin-bottom:4px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px 10px;outline:none;border-radius:var(--radius)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--cyan)}
.form-textarea{resize:vertical;min-height:60px}
.mineral-entry-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:8px;background:rgba(0,0,0,.2);padding:8px;border-radius:var(--radius);border:1px solid var(--border)}
.mineral-entry-row .form-input,.mineral-entry-row .form-select{font-size:11px;padding:6px 8px}
.btn-remove-min{background:transparent;border:1px solid var(--border);color:var(--textdim);padding:6px 8px;cursor:pointer;border-radius:var(--radius);font-size:12px;transition:all .2s;flex-shrink:0}
.btn-remove-min:hover{border-color:var(--red);color:var(--red)}
#add-mineral-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;background:transparent;border:1px dashed var(--border2);color:var(--textdim);padding:7px;width:100%;cursor:pointer;transition:all .2s;border-radius:var(--radius);margin-bottom:12px}
#add-mineral-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* ── MAP ───────────────────────────────────── */
#map-panel{padding:0!important}
#map-canvas-wrap{position:relative;width:100%;height:100%;overflow:hidden;background:radial-gradient(ellipse at 50% 50%,#040d18 0%,#020810 100%)}
#map-svg{width:100%;height:100%;position:absolute;inset:0}
#map-controls{position:absolute;top:14px;left:14px;z-index:10;display:flex;flex-direction:column;gap:6px}
.map-ctrl-btn{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;background:rgba(4,13,24,.9);border:1px solid var(--border2);color:var(--text);padding:7px 12px;cursor:pointer;transition:all .2s;border-radius:var(--radius)}
.map-ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.map-ctrl-btn.active{border-color:var(--gold);color:var(--gold)}
#map-legend{position:absolute;bottom:14px;left:14px;z-index:10;background:rgba(4,13,24,.9);border:1px solid var(--border);padding:10px 14px;border-radius:var(--radius)}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim)}
.legend-row:last-child{margin-bottom:0}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAP TOOLTIP */
#map-tooltip{position:absolute;z-index:20;background:rgba(4,13,24,.95);border:1px solid var(--border2);padding:10px 14px;pointer-events:none;display:none;min-width:160px}
.tt-name{font-family:'Orbitron',monospace;font-size:11px;color:var(--cyan);margin-bottom:4px}
.tt-row{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim);margin-bottom:2px}
.tt-minerals{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);margin-top:4px}

/* JOURNEY PANEL */
#journey-panel{display:flex;flex-direction:column;height:100%;padding:0}
.journey-layout{display:flex;height:100%;overflow:hidden}
.journey-sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:16px}
.journey-sidebar::-webkit-scrollbar{width:3px}
.journey-sidebar::-webkit-scrollbar-thumb{background:var(--border2)}
.journey-main{flex:1;overflow-y:auto;padding:16px}
.journey-main::-webkit-scrollbar{width:3px}
.journey-main::-webkit-scrollbar-thumb{background:var(--border2)}
.journey-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.journey-card:hover{border-color:var(--border2)}
.journey-card.active{border-color:var(--gold);background:rgba(232,160,32,.05)}
.jc-name{font-family:'Orbitron',monospace;font-size:11px;color:var(--text2);font-weight:600;letter-spacing:1px}
.jc-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim);margin-top:3px}

/* JOURNEY DETAIL */
.journey-detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--textdim);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px}
.journey-stop{display:flex;gap:12px;margin-bottom:0;position:relative}
.stop-line{position:absolute;left:15px;top:30px;bottom:-10px;width:1px;background:var(--border)}
.stop-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--cyan);background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Orbitron',monospace;font-size:11px;color:var(--cyan);font-weight:700;position:relative;z-index:1}
.stop-content{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px}
.stop-name{font-family:'Orbitron',monospace;font-size:11px;color:var(--cyan);font-weight:700;margin-bottom:4px}
.stop-note{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--textdim);margin-top:6px;font-style:italic}
.stop-entries{margin-top:8px}
.stop-entry-pill{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text);background:rgba(0,200,232,.08);border:1px solid var(--border2);border-radius:10px;padding:2px 8px;margin:2px}
.stop-actions{display:flex;gap:6px;margin-top:8px}
.journey-progress{margin-bottom:16px}
.progress-bar-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;height:8px;overflow:hidden;margin-top:4px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--gold));border-radius:10px;transition:width .3s}
.progress-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--textdim);margin-top:4px}

/* STARS background */
.star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;z-index:0}
</style>
</head>
<body>
<div id="grid-bg"></div>

<!-- STARS -->
<script>
(function(){
  const n=120;
  for(let i=0;i<n;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()<0.05?2:Math.random()<0.2?1.5:1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${0.1+Math.random()*0.4}`;
    document.body.appendChild(s);
  }
})();
</script>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">UEE MINING ATLAS</div>
    <div class="login-sub">CLASSIFIED RESOURCE INTELLIGENCE · V4.7</div>
    <label class="field-label">PILOT HANDLE</label>
    <input class="field-input" id="li-user" placeholder="TheRealKnight" autocomplete="off">
    <label class="field-label">ACCESS CODE</label>
    <input class="field-input" id="li-pass" type="password" placeholder="••••••••">
    <div class="login-err" id="li-err"></div>
    <button class="btn-login" onclick="doLogin()">AUTHENTICATE</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="header">
    <div class="header-logo">UEE MINING ATLAS <span>v4.7</span></div>
    <div class="header-sep"></div>
    <button class="nav-tab active" onclick="showPanel('atlas')">ATLAS</button>
    <button class="nav-tab" onclick="showPanel('mineral')">MINERAL SEARCH</button>
    <button class="nav-tab" onclick="showPanel('map')">STAR MAP</button>
    <div class="header-right">
      <div class="user-dot"></div>
      <span class="user-name" id="header-user"></span>
      <button class="btn-sm" onclick="importData()">IMPORT</button>
        <button class="btn-sm" onclick="exportData()">EXPORT</button>
        <button class="btn-sm" onclick="doLogout()">LOGOUT</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
    </div>
  </div>
  <div id="main">

    <!-- ATLAS PANEL -->
    <div class="panel active" id="panel-atlas">
      <div class="sec-head">
        <div class="sec-title">LOCATION DATABASE</div>
        <div class="sec-count" id="atlas-count">0 locations</div>
        <div class="sec-line"></div>
        <button class="btn-gold" onclick="openAddLocation()">+ ADD LOCATION</button>
      </div>
      <div class="filters-row">
        <input class="filter-input" id="flt-search" placeholder="Search locations..." oninput="renderAtlas()">
        <select class="filter-select" id="flt-system" onchange="renderAtlas()">
          <option value="">All Systems</option>
          <option>Stanton</option>
          <option>Pyro</option>
          <option>Nyx</option>
        </select>
        <select class="filter-select" id="flt-type" onchange="renderAtlas()">
          <option value="">All Types</option>
          <option value="planet">Planet</option>
          <option value="moon">Moon</option>
          <option value="asteroid">Asteroid Belt/Cluster</option>
        </select>
      </div>
      <div class="loc-grid" id="atlas-grid"></div>
    </div>

    <!-- MINERAL SEARCH PANEL -->
    <div class="panel" id="panel-mineral">
      <div class="sec-head">
        <div class="sec-title">MINERAL SEARCH</div>
        <div class="sec-line"></div>
      </div>
      <div class="filters-row">
        <input class="filter-input" id="min-search" placeholder="Search mineral name..." oninput="renderMineralSearch()">
        <select class="filter-select" id="min-system" onchange="renderMineralSearch()">
          <option value="">All Systems</option>
          <option>Stanton</option>
          <option>Pyro</option>
          <option>Nyx</option>
        </select>
      </div>
      <div id="mineral-results"></div>
    </div>

    <!-- MAP PANEL (includes journey overlay) -->
    <div class="panel" id="panel-map" style="padding:0;overflow:hidden">
      <div style="display:flex;height:100%;position:relative">
        <!-- MAP CANVAS -->
        <div id="map-canvas-wrap" style="flex:1;position:relative">
          <svg id="map-svg" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <!-- Glows -->
              <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#00c8e8" stop-opacity="0.4"/>
                <stop offset="100%" stop-color="#00c8e8" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="glow-gold" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#e8a020" stop-opacity="0.4"/>
                <stop offset="100%" stop-color="#e8a020" stop-opacity="0"/>
              </radialGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="2.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <!-- Surface gradients per body type -->
              <radialGradient id="surf-planet" cx="38%" cy="35%" r="65%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
                <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
                <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
              </radialGradient>
              <radialGradient id="surf-moon" cx="38%" cy="35%" r="65%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
                <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
                <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
              </radialGradient>
              <radialGradient id="surf-gasplanet" cx="35%" cy="40%" r="70%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
                <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05"/>
                <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
              </radialGradient>
              <!-- Atmosphere glow rim for planets -->
              <radialGradient id="atm-blue" cx="50%" cy="50%" r="50%">
                <stop offset="75%" stop-color="#00c8e8" stop-opacity="0"/>
                <stop offset="100%" stop-color="#00c8e8" stop-opacity="0.35"/>
              </radialGradient>
              <radialGradient id="atm-orange" cx="50%" cy="50%" r="50%">
                <stop offset="75%" stop-color="#ff6020" stop-opacity="0"/>
                <stop offset="100%" stop-color="#ff6020" stop-opacity="0.3"/>
              </radialGradient>
              <radialGradient id="atm-purple" cx="50%" cy="50%" r="50%">
                <stop offset="75%" stop-color="#cc44ff" stop-opacity="0"/>
                <stop offset="100%" stop-color="#cc44ff" stop-opacity="0.25"/>
              </radialGradient>
            </defs>
            <g id="map-orbit-rings"></g>
            <g id="map-journey-lines"></g>
            <g id="map-nodes"></g>
          </svg>
          <div id="map-controls">
            <button class="map-ctrl-btn active" onclick="switchSystem('Stanton')" id="btn-stanton">STANTON</button>
            <button class="map-ctrl-btn" onclick="switchSystem('Pyro')" id="btn-pyro">PYRO</button>
            <button class="map-ctrl-btn" onclick="switchSystem('Nyx')" id="btn-nyx">NYX</button>
          </div>
          <div id="map-legend">
            <div class="legend-row"><div class="legend-dot" style="background:#00c8e8"></div> Planet</div>
            <div class="legend-row"><div class="legend-dot" style="background:#e8a020"></div> Moon</div>
            <div class="legend-row"><div class="legend-dot" style="background:#cc44ff"></div> Asteroid Belt</div>
            <div class="legend-row"><div class="legend-dot" style="background:#20e880"></div> Has Atlas Entry</div>
            <div class="legend-row"><div class="legend-dot" style="background:#ffcc55"></div> Journey Stop</div>
          </div>
          <div id="map-tooltip">
            <div class="tt-name" id="tt-name"></div>
            <div class="tt-row" id="tt-type"></div>
            <div class="tt-minerals" id="tt-minerals"></div>
          </div>
        </div>
        <!-- JOURNEY SIDEBAR (on map) -->
        <div id="map-journey-sidebar" style="width:280px;flex-shrink:0;border-left:1px solid var(--border);background:rgba(2,8,16,.96);display:flex;flex-direction:column;overflow:hidden">
          <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
            <div style="font-family:Orbitron,monospace;font-size:10px;color:var(--gold);letter-spacing:3px;flex:1">JOURNEYS</div>
            <button class="btn-gold" style="font-size:7px;padding:4px 10px" onclick="createJourney()">+ NEW</button>
          </div>
          <div id="journey-list" style="overflow-y:auto;padding:10px;flex:1"></div>
          <div id="journey-detail" style="overflow-y:auto;padding:10px;border-top:1px solid var(--border);flex:2;min-height:0">
            <div class="journey-detail-empty">SELECT A JOURNEY</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- LOCATION MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">ADD LOCATION</div>
    <input type="hidden" id="edit-id">

    <div class="modal-section">LOCATION INFO</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">LOCATION NAME</label>
        <input class="form-input" id="f-name" placeholder="e.g. Yela Asteroid Belt">
      </div>
      <div class="form-group">
        <label class="form-label">SYSTEM</label>
        <select class="form-select" id="f-system">
          <option>Stanton</option>
          <option>Pyro</option>
          <option>Nyx</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">TYPE</label>
        <select class="form-select" id="f-type">
          <option value="planet">Planet</option>
          <option value="moon">Moon</option>
          <option value="asteroid">Asteroid Belt/Cluster</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">PARENT BODY (optional)</label>
        <input class="form-input" id="f-parent" placeholder="e.g. Crusader">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label class="form-label">NOTES</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Danger level, tips, coordinates..."></textarea>
    </div>

    <div class="modal-section">MINERALS FOUND</div>
    <div id="mineral-entries"></div>
    <button id="add-mineral-btn" onclick="addMineralRow()">+ ADD MINERAL</button>

    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal()">CANCEL</button>
      <button class="btn-gold" onclick="saveLocation()">SAVE</button>
    </div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────
const DB_KEY='atlas_locations', JDB_KEY='atlas_journeys', USER_KEY='atlas_user';

function dbLoad(key){try{return JSON.parse(localStorage.getItem(key)||'[]')}catch{return[]}}
function dbSave(key,data){localStorage.setItem(key,JSON.stringify(data))}

let locations=dbLoad(DB_KEY);
let journeys=dbLoad(JDB_KEY);
let currentUser='';
let activeSystem='Stanton';
let activeJourneyId=null;

// ── AUTH ─────────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('li-user').value.trim();
  const p=document.getElementById('li-pass').value;
  if(!u){document.getElementById('li-err').textContent='ENTER PILOT HANDLE';return}
  if(!p){document.getElementById('li-err').textContent='ENTER ACCESS CODE';return}
  currentUser=u;
  localStorage.setItem(USER_KEY,u);
  document.getElementById('header-user').textContent=u.toUpperCase();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  renderAtlas();renderMap();renderJourneys();
}
function doLogout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('li-pass').value='';
  document.getElementById('li-err').textContent='';
}
// Auto-login
(function(){
  const u=localStorage.getItem(USER_KEY);
  if(u){
    document.getElementById('li-user').value=u;
    // don't auto-login, just pre-fill
  }
})();
document.getElementById('li-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('li-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('li-pass').focus()});

// ── PANELS ────────────────────────────────────────────────────
function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  event.target.classList.add('active');
  if(name==='map'){setTimeout(()=>{renderMap();renderJourneys();},50)}
  if(name==='mineral'){renderMineralSearch()}
}

// ── UTILS ─────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function typeIcon(t){return t==='planet'?'🪐':t==='moon'?'🌑':'☄️'}
function typeColor(t){return t==='planet'?'planet':t==='moon'?'moon':'asteroid'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── ATLAS ─────────────────────────────────────────────────────
function renderAtlas(){
  const q=(document.getElementById('flt-search').value||'').toLowerCase();
  const sys=document.getElementById('flt-system').value;
  const typ=document.getElementById('flt-type').value;
  let locs=locations.filter(l=>{
    if(sys&&l.system!==sys)return false;
    if(typ&&l.type!==typ)return false;
    if(q&&!(l.name.toLowerCase().includes(q)||(l.notes||'').toLowerCase().includes(q)||(l.minerals||[]).some(m=>m.name.toLowerCase().includes(q))))return false;
    return true;
  });
  document.getElementById('atlas-count').textContent=`${locs.length} location${locs.length!==1?'s':''}`;
  const grid=document.getElementById('atlas-grid');
  if(!locs.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">🔭</div><div class="empty-title">NO LOCATIONS FOUND</div><div class="empty-sub">Add your first mining location to begin</div></div>`;
    return;
  }
  grid.innerHTML=locs.map(l=>`
    <div class="loc-card" id="card-${l.id}">
      <div class="loc-header" onclick="toggleCard('${l.id}')">
        <div class="loc-icon ${typeColor(l.type)}">${typeIcon(l.type)}</div>
        <div class="loc-info">
          <div class="loc-name">${esc(l.name)}</div>
          <div class="loc-meta">${esc(l.system)} · ${l.type.toUpperCase()}${l.parent?' · '+esc(l.parent):''}</div>
          <div class="loc-mineral-pills">${(l.minerals||[]).map(m=>`<span class="mineral-pill">${esc(m.name)}</span>`).join('')}</div>
        </div>
        <div class="loc-stats">
          <div class="loc-stat"><div class="loc-stat-val">${(l.minerals||[]).length}</div><div class="loc-stat-lbl">MINERALS</div></div>
        </div>
        <div class="loc-chevron">▼</div>
      </div>
      <div class="loc-body">
        ${(l.minerals||[]).length?`
        <table class="min-table">
          <thead><tr><th>MINERAL</th><th>CONCENTRATION</th><th>MASS</th><th>RESISTANCE</th><th>RATING</th></tr></thead>
          <tbody>${(l.minerals||[]).map(m=>`<tr>
            <td class="min-name">${esc(m.name)}</td>
            <td>${m.concentration||'—'}</td>
            <td>${m.mass||'—'}</td>
            <td>${m.resistance||'—'}</td>
            <td>${'★'.repeat(m.rating||0)+'☆'.repeat(5-(m.rating||0))}</td>
          </tr>`).join('')}</tbody>
        </table>`:'<div style="color:var(--textdim);font-family:Share Tech Mono,monospace;font-size:11px;margin-bottom:8px">No minerals logged yet.</div>'}
        ${l.notes?`<div class="loc-notes">"${esc(l.notes)}"</div>`:''}
        <div class="min-actions">
          <button class="btn-xs" onclick="editLocation('${l.id}')">EDIT</button>
          <button class="btn-xs" onclick="addToJourneyFromAtlas('${l.id}')">ADD TO JOURNEY</button>
          <button class="btn-xs danger" onclick="deleteLocation('${l.id}')">DELETE</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCard(id){
  document.getElementById('card-'+id).classList.toggle('expanded');
}

// ── LOCATION CRUD ─────────────────────────────────────────────
function openAddLocation(){
  document.getElementById('modal-title').textContent='ADD LOCATION';
  document.getElementById('edit-id').value='';
  document.getElementById('f-name').value='';
  document.getElementById('f-system').value='Stanton';
  document.getElementById('f-type').value='planet';
  document.getElementById('f-parent').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('mineral-entries').innerHTML='';
  addMineralRow();
  document.getElementById('modal-overlay').classList.add('open');
}

function editLocation(id){
  const l=locations.find(x=>x.id===id);if(!l)return;
  document.getElementById('modal-title').textContent='EDIT LOCATION';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-name').value=l.name;
  document.getElementById('f-system').value=l.system;
  document.getElementById('f-type').value=l.type;
  document.getElementById('f-parent').value=l.parent||'';
  document.getElementById('f-notes').value=l.notes||'';
  document.getElementById('mineral-entries').innerHTML='';
  (l.minerals||[]).forEach(m=>addMineralRow(m));
  if(!(l.minerals||[]).length)addMineralRow();
  document.getElementById('modal-overlay').classList.add('open');
}

function saveLocation(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Enter a location name.');return;}
  const minerals=[];
  document.querySelectorAll('.mineral-entry-row').forEach(row=>{
    const n=row.querySelector('.me-name').value.trim();
    if(!n)return;
    minerals.push({
      name:n,
      concentration:row.querySelector('.me-conc').value.trim(),
      mass:row.querySelector('.me-mass').value.trim(),
      resistance:row.querySelector('.me-res').value.trim(),
      rating:parseInt(row.querySelector('.me-rating').value)||0,
    });
  });
  const id=document.getElementById('edit-id').value;
  const entry={
    id:id||uid(),
    name,
    system:document.getElementById('f-system').value,
    type:document.getElementById('f-type').value,
    parent:document.getElementById('f-parent').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    minerals,
    addedAt:id?(locations.find(x=>x.id===id)||{}).addedAt||Date.now():Date.now(),
    updatedAt:Date.now(),
  };
  if(id){const i=locations.findIndex(x=>x.id===id);if(i>-1)locations[i]=entry;}
  else locations.unshift(entry);
  dbSave(DB_KEY,locations);
  closeModal();renderAtlas();renderMap();
}

function deleteLocation(id){
  if(!confirm('Delete this location?'))return;
  locations=locations.filter(x=>x.id!==id);
  dbSave(DB_KEY,locations);
  renderAtlas();renderMap();
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

function addMineralRow(m){
  m=m||{};
  const div=document.createElement('div');
  div.className='mineral-entry-row';
  div.innerHTML=`
    <div class="form-group" style="flex:2">
      <div class="form-label">MINERAL</div>
      <input class="form-input me-name" placeholder="e.g. Taranite" value="${esc(m.name||'')}">
    </div>
    <div class="form-group">
      <div class="form-label">CONC %</div>
      <input class="form-input me-conc" placeholder="34%" value="${esc(m.concentration||'')}">
    </div>
    <div class="form-group">
      <div class="form-label">MASS</div>
      <input class="form-input me-mass" placeholder="4200" value="${esc(m.mass||'')}">
    </div>
    <div class="form-group">
      <div class="form-label">RESISTANCE</div>
      <input class="form-input me-res" placeholder="2.1" value="${esc(m.resistance||'')}">
    </div>
    <div class="form-group" style="max-width:60px">
      <div class="form-label">RATING</div>
      <input class="form-input me-rating" type="number" min="0" max="5" placeholder="0-5" value="${m.rating||0}">
    </div>
    <button class="btn-remove-min" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('mineral-entries').appendChild(div);
}

// ── MINERAL SEARCH ────────────────────────────────────────────
function renderMineralSearch(){
  const q=(document.getElementById('min-search').value||'').toLowerCase();
  const sys=document.getElementById('min-system').value;
  const mineral2locs=new Map();
  locations.forEach(l=>{
    if(sys&&l.system!==sys)return;
    (l.minerals||[]).forEach(m=>{
      if(q&&!m.name.toLowerCase().includes(q))return;
      const key=m.name;
      if(!mineral2locs.has(key))mineral2locs.set(key,[]);
      mineral2locs.get(key).push({loc:l,mineral:m});
    });
  });
  const res=document.getElementById('mineral-results');
  if(!mineral2locs.size){
    res.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">NO MINERALS FOUND</div><div class="empty-sub">Add mineral data to locations in the Atlas tab</div></div>`;
    return;
  }
  const sorted=[...mineral2locs.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
  res.innerHTML=`<div class="search-results">${sorted.map(([name,entries])=>`
    <div class="search-result-card">
      <div class="sr-mineral">${esc(name)}</div>
      <div class="sr-locations">
        ${entries.map(e=>`
          <div class="sr-loc-row">
            <span class="sr-loc-name">${esc(e.loc.name)}</span>
            <span class="sr-loc-type">${esc(e.loc.system)} · ${e.loc.type.toUpperCase()}</span>
            <span class="sr-conc">${e.mineral.concentration||'—'}</span>
          </div>`).join('')}
      </div>
    </div>
  `).join('')}</div>`;
}

      {name:'Delamar',type:'moon',x:50,y:30,r:3.0,color:'#605040',orbitR:20},
      {name:'Glaciem Ring',type:'asteroid',x:50,y:50,r:3,color:'#cc44ff',ring:true,ringR:20},
      {name:'Keeger Belt',type:'asteroid',x:50,y:50,r:3,color:'#9933cc',ring:true,ringR:36},
    ]
  }
};

function switchSystem(sys){
  activeSystem=sys;
  document.querySelectorAll('.map-ctrl-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+sys.toLowerCase()).classList.add('active');
  renderMap();
}

function renderMap(){
  const layout=SYSTEM_LAYOUTS[activeSystem];
  if(!layout)return;
  const svg=document.getElementById('map-svg');
  const W=svg.clientWidth||900, H=svg.clientHeight||600;
  const px=p=>p/100*W, py=p=>p/100*H;
  const sc=Math.min(W,H)/100;
  const locMap=new Map(locations.filter(l=>l.system===activeSystem).map(l=>[l.name,l]));

  // Build journey stop set for current system
  const journeyStops=new Set();
  if(activeJourneyId){
    const j=journeys.find(x=>x.id===activeJourneyId);
    if(j)(j.stops||[]).forEach(s=>{if(s.system===activeSystem)journeyStops.add(s.locName)});
  }

  let rings='', jlines='', nodes='';

  // Orbit rings (faint circles around star)
  layout.bodies.forEach(b=>{
    if(!b.orbitR||b.parent)return;
    const cx=px(layout.star.x),cy=py(layout.star.y),r=sc*b.orbitR;
    rings+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(42,95,136,0.18)" stroke-width="1" stroke-dasharray="2,6"/>`;
  });

  // Asteroid rings
  layout.bodies.forEach(b=>{
    if(!b.ring)return;
    const cx=px(b.x),cy=py(b.y),r=sc*b.ringR;
    const hasEntry=locMap.has(b.name);
    const ringStroke=hasEntry?'#20e880':b.color;
    rings+=`<ellipse cx="${cx}" cy="${cy}" rx="${r}" ry="${r*0.3}" fill="none" stroke="${ringStroke}" stroke-width="1.5" stroke-dasharray="2,5" opacity="0.4"
      style="cursor:pointer"
      onmouseenter="showMapTooltip(event,'${esc(b.name)}','${b.type}',${hasEntry})"
      onmouseleave="hideMapTooltip()"
      onclick="handleMapNodeClick('${esc(b.name)}')"
    />`;
    // Label near ring
    rings+=`<text x="${cx}" y="${cy-r*0.3-6}" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="7" fill="${hasEntry?'#20e880':b.color}" opacity="0.7" style="pointer-events:none">${b.name}</text>`;
    // Dots to suggest asteroid field
    for(let i=0;i<28;i++){
      const ang=(i/28)*Math.PI*2;
      const rx2=r+(Math.random()-0.5)*sc*2;
      const ry2=r*0.3+(Math.random()-0.5)*sc*0.8;
      const dx=Math.cos(ang)*rx2;
      const dy=Math.sin(ang)*ry2;
      rings+=`<circle cx="${cx+dx}" cy="${cy+dy}" r="${0.5+Math.random()}" fill="${b.color}" opacity="${0.2+Math.random()*0.3}" style="pointer-events:none"/>`;
    }
  });

  // Journey lines between stops in current system
  if(activeJourneyId){
    const j=journeys.find(x=>x.id===activeJourneyId);
    if(j){
      const sysStops=(j.stops||[]).filter(s=>s.system===activeSystem);
      for(let i=0;i<sysStops.length-1;i++){
        const a=sysStops[i],b2=sysStops[i+1];
        const ba=layout.bodies.find(x=>x.name===a.locName);
        const bb=layout.bodies.find(x=>x.name===b2.locName);
        if(ba&&bb){
          const x1=px(ba.x),y1=py(ba.y),x2=px(bb.x),y2=py(bb.y);
          jlines+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#ffcc55" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>`;
          const mx=(x1+x2)/2,my=(y1+y2)/2;
          jlines+=`<circle cx="${mx}" cy="${my}" r="2" fill="#ffcc55" opacity="0.5"/>`;
        }
      }
    }
  }

  // Star
  const scx=px(layout.star.x),scy=py(layout.star.y),sr=sc*layout.star.r;
  nodes+=`<circle cx="${scx}" cy="${scy}" r="${sr*3}" fill="url(#glow-gold)" opacity="0.2"/>`;
  nodes+=`<circle cx="${scx}" cy="${scy}" r="${sr*1.4}" fill="${layout.star.color}" opacity="0.15"/>`;
  nodes+=`<circle cx="${scx}" cy="${scy}" r="${sr}" fill="${layout.star.color}" opacity="0.95" filter="url(#glow)"/>`;
  nodes+=`<circle cx="${scx}" cy="${scy}" r="${sr}" fill="url(#surf-planet)" opacity="0.6"/>`;
  nodes+=`<text x="${scx}" y="${scy+sr+11}" text-anchor="middle" font-family="Orbitron,monospace" font-size="8" fill="#ffe066" letter-spacing="2" opacity="0.7">${layout.star.label}</text>`;

  // Bodies
  layout.bodies.forEach(b=>{
    if(b.ring)return;
    const cx=px(b.x),cy=py(b.y),r=sc*b.r;
    const hasEntry=locMap.has(b.name);
    const isJStop=journeyStops.has(b.name);
    const stroke=isJStop?'#ffcc55':hasEntry?'#20e880':b.type==='planet'?'#00c8e8':b.type==='moon'?'rgba(232,160,32,0.6)':'#cc44ff';
    const sw=isJStop?2.5:hasEntry?2:1;
    const surf=b.isGasGiant?'surf-gasplanet':b.type==='planet'?'surf-planet':'surf-moon';

    // Atmosphere rim for planets
    if(b.type==='planet'&&b.atm){
      nodes+=`<circle cx="${cx}" cy="${cy}" r="${r*1.18}" fill="url(#${b.atm})" opacity="0.7"/>`;
    }

    // Body
    nodes+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${b.color}" opacity="0.9"
      stroke="${stroke}" stroke-width="${sw}"
      style="cursor:pointer"
      onmouseenter="showMapTooltip(event,'${esc(b.name)}','${b.type}',${hasEntry})"
      onmouseleave="hideMapTooltip()"
      onclick="handleMapNodeClick('${esc(b.name)}')"
    />`;

    // Surface shading
    nodes+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#${surf})" style="cursor:pointer;pointer-events:none" opacity="0.8"/>`;

    // Gas giant bands
    if(b.isGasGiant){
      for(let i=0;i<3;i++){
        const by=cy-r*0.4+i*r*0.4;
        const bh=r*0.12;
        nodes+=`<rect x="${cx-r}" y="${by}" width="${r*2}" height="${bh}" fill="rgba(255,255,255,0.05)" style="pointer-events:none"/>`;
      }
    }

    // Entry glow ring
    if(hasEntry&&!isJStop){
      nodes+=`<circle cx="${cx}" cy="${cy}" r="${r+3}" fill="none" stroke="#20e880" stroke-width="1" opacity="0.35" stroke-dasharray="2,3" style="pointer-events:none"/>`;
    }
    // Journey stop ring
    if(isJStop){
      nodes+=`<circle cx="${cx}" cy="${cy}" r="${r+4}" fill="none" stroke="#ffcc55" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,2" style="pointer-events:none"/>`;
    }

    // Label
    const labelY=cy+r+(b.type==='moon'?7:9);
    const shortName=b.name.length>12?b.name.slice(0,11)+'…':b.name;
    const labelCol=isJStop?'#ffcc55':hasEntry?'#20e880':b.type==='planet'?'#6090b0':'#3a6080';
    nodes+=`<text x="${cx}" y="${labelY}" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="${b.type==='moon'?7:8}" fill="${labelCol}" letter-spacing="0.5" style="pointer-events:none">${shortName}</text>`;
  });

  document.getElementById('map-orbit-rings').innerHTML=rings;
  document.getElementById('map-journey-lines').innerHTML=jlines;
  document.getElementById('map-nodes').innerHTML=nodes;
}

function showMapTooltip(e,name,type,hasEntry){
  const tt=document.getElementById('map-tooltip');
  const loc=locations.find(l=>l.name===name&&l.system===activeSystem);
  document.getElementById('tt-name').textContent=name;
  document.getElementById('tt-type').textContent=type.toUpperCase()+(hasEntry?' · HAS ENTRY':' · NO ENTRY');
  document.getElementById('tt-minerals').textContent=loc?(loc.minerals||[]).map(m=>m.name).join(', '):'';
  tt.style.display='block';
  const wrap=document.getElementById('map-canvas-wrap').getBoundingClientRect();
  tt.style.left=(e.clientX-wrap.left+12)+'px';
  tt.style.top=(e.clientY-wrap.top+12)+'px';
}
function hideMapTooltip(){document.getElementById('map-tooltip').style.display='none'}
function handleMapNodeClick(name){
  const loc=locations.find(l=>l.name===name&&l.system===activeSystem);
  if(loc){
    // Show tooltip with location info instead of navigating away
    alert(`📍 ${loc.name}\n${loc.system} · ${loc.type}\n\nMinerals: ${(loc.minerals||[]).map(m=>m.name).join(', ')||'None logged'}\n\nNotes: ${loc.notes||'—'}`);
  } else {
    // No atlas entry yet
    if(confirm(`No atlas entry for "${name}" yet.\nAdd one now?`)){
      document.getElementById('f-name').value=name;
      document.getElementById('f-system').value=activeSystem;
      const b=SYSTEM_LAYOUTS[activeSystem].bodies.find(x=>x.name===name);
      if(b)document.getElementById('f-type').value=b.type;
      document.getElementById('mineral-entries').innerHTML='';
      addMineralRow();
      document.getElementById('edit-id').value='';
      document.getElementById('modal-title').textContent='ADD LOCATION';
      document.getElementById('modal-overlay').classList.add('open');
    }
  }
}

// ── JOURNEYS ──────────────────────────────────────────────────
function renderJourneys(){
  const list=document.getElementById('journey-list');
  if(!list)return;
  if(!journeys.length){
    list.innerHTML=`<div style="color:var(--textdim);font-family:Share Tech Mono,monospace;font-size:11px;text-align:center;padding:20px">No journeys yet</div>`;
  }else{
    list.innerHTML=journeys.map(j=>`
      <div class="journey-card${j.id===activeJourneyId?' active':''}" onclick="selectJourney('${j.id}')">
        <div class="jc-name">${esc(j.name)}</div>
        <div class="jc-meta">${j.stops.length} stops · ${new Date(j.createdAt).toLocaleDateString()}</div>
        <div class="jc-meta" style="margin-top:3px;color:var(--cyan)">${Math.round(j.stops.filter(s=>s.visited).length/Math.max(j.stops.length,1)*100)}% complete</div>
      </div>
    `).join('');
  }
  if(activeJourneyId)renderJourneyDetail();
}

function createJourney(){
  const name=prompt('Journey name:');
  if(!name)return;
  const j={id:uid(),name:name.trim(),stops:[],notes:'',createdAt:Date.now()};
  journeys.unshift(j);
  dbSave(JDB_KEY,journeys);
  activeJourneyId=j.id;
  renderJourneys();
}

function selectJourney(id){
  activeJourneyId=id;
  renderJourneys();
  renderMap();
}

function renderJourneyDetail(){
  const j=journeys.find(x=>x.id===activeJourneyId);
  const det=document.getElementById('journey-detail');
  if(!j){det.innerHTML='<div class="journey-detail-empty">SELECT A JOURNEY</div>';return;}
  const total=j.stops.length, done=j.stops.filter(s=>s.visited).length;
  const pct=total?Math.round(done/total*100):0;

  let stopsHtml=j.stops.length?j.stops.map((s,i)=>`
    <div class="journey-stop">
      ${i<j.stops.length-1?'<div class="stop-line"></div>':''}
      <div class="stop-dot" style="${s.visited?'border-color:var(--green);color:var(--green)':''}">${i+1}</div>
      <div class="stop-content">
        <div class="stop-name">${esc(s.locName||'Unknown')}</div>
        <div class="jc-meta">${esc(s.system||'')} · ${(s.type||'').toUpperCase()}</div>
        ${(s.entryIds||[]).length?`<div class="stop-entries">${(s.entryIds||[]).map(id=>{const l=locations.find(x=>x.id===id);return l?`<span class="stop-entry-pill">${esc(l.name)}</span>`:''}).join('')}</div>`:''}
        ${s.note?`<div class="stop-note">"${esc(s.note)}"</div>`:''}
        <div class="stop-actions">
          <button class="btn-xs" onclick="toggleStopVisited('${j.id}',${i})">${s.visited?'MARK UNVISITED':'MARK VISITED'}</button>
          <button class="btn-xs" onclick="editStopNote('${j.id}',${i})">NOTE</button>
          <button class="btn-xs danger" onclick="removeStop('${j.id}',${i})">REMOVE</button>
        </div>
      </div>
    </div>
  `).join(''):`<div style="color:var(--textdim);font-family:Share Tech Mono,monospace;font-size:11px;padding:20px 0">No stops added yet. Use "Add to Journey" from the Atlas.</div>`;

  det.innerHTML=`
    <div class="sec-head">
      <div class="sec-title" style="font-size:11px">${esc(j.name)}</div>
      <div class="sec-line"></div>
      <button class="btn-xs danger" onclick="deleteJourney('${j.id}')">DELETE</button>
    </div>
    <div class="journey-progress">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${done}/${total} stops visited · ${pct}% complete</div>
    </div>
    ${j.notes?`<div class="loc-notes" style="margin-bottom:12px">"${esc(j.notes)}"</div>`:''}
    <button class="btn-xs" style="margin-bottom:16px" onclick="editJourneyNotes('${j.id}')">EDIT JOURNEY NOTES</button>
    <div>${stopsHtml}</div>
  `;
}

function addToJourneyFromAtlas(locId){
  if(!journeys.length){alert('Create a journey first in the Journeys tab.');return;}
  const j=journeys.length===1?journeys[0]:journeys[parseInt(prompt('Select journey (0-'+((journeys.length-1))+'): '+journeys.map((j,i)=>i+'. '+j.name).join(', '))||0)];
  if(!j)return;
  const l=locations.find(x=>x.id===locId);if(!l)return;
  j.stops.push({locName:l.name,system:l.system,type:l.type,entryIds:[locId],note:'',visited:false});
  dbSave(JDB_KEY,journeys);
  activeJourneyId=j.id;
  alert(`Added "${l.name}" to "${j.name}"`);
}

function toggleStopVisited(jid,idx){
  const j=journeys.find(x=>x.id===jid);if(!j)return;
  j.stops[idx].visited=!j.stops[idx].visited;
  dbSave(JDB_KEY,journeys);renderJourneys();
}
function editStopNote(jid,idx){
  const j=journeys.find(x=>x.id===jid);if(!j)return;
  const n=prompt('Note for this stop:',j.stops[idx].note||'');
  if(n===null)return;
  j.stops[idx].note=n.trim();
  dbSave(JDB_KEY,journeys);renderJourneys();
}
function removeStop(jid,idx){
  const j=journeys.find(x=>x.id===jid);if(!j)return;
  if(!confirm('Remove this stop?'))return;
  j.stops.splice(idx,1);
  dbSave(JDB_KEY,journeys);renderJourneys();
}
function deleteJourney(id){
  if(!confirm('Delete this journey?'))return;
  journeys=journeys.filter(x=>x.id!==id);
  if(activeJourneyId===id)activeJourneyId=null;
  dbSave(JDB_KEY,journeys);renderJourneys();
}
function editJourneyNotes(id){
  const j=journeys.find(x=>x.id===id);if(!j)return;
  const n=prompt('Journey notes:',j.notes||'');
  if(n===null)return;
  j.notes=n.trim();
  dbSave(JDB_KEY,journeys);renderJourneys();
}

// ── IMPORT / EXPORT ──────────────────────────────────────────
function exportData(){
  const payload={locations,journeys,exportedAt:new Date().toISOString(),version:'4.7-new'};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`sc_mining_atlas_${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(url);
}

function importData(){
  document.getElementById('import-file').click();
}

function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      // Support both old and new format
      if(data.locations){
        if(confirm(`Import ${data.locations.length} locations and ${(data.journeys||[]).length} journeys? This will REPLACE existing data.`)){
          locations=data.locations;
          journeys=data.journeys||[];
          dbSave(DB_KEY,locations);
          dbSave(JDB_KEY,journeys);
          renderAtlas();renderMap();renderJourneys();
          alert('Import successful!');
        }
      } else if(data.atlas){
        // Old format — convert on the fly
        if(confirm(`Detected old format with ${data.atlas.length} entries. Convert and import? This will REPLACE existing data.`)){
          const locMap=new Map();
          data.atlas.forEach(e=>{
            if(!locMap.has(e.location))locMap.set(e.location,[]);
            locMap.get(e.location).push(e);
          });
          locations=[];
          locMap.forEach((entries,locName)=>{
            const minerals=[];
            entries.forEach(e=>{
              [e.primaryMineral,e.secondaryMineral,e.tertiaryMineral].filter(Boolean).forEach(m=>{
                if(!minerals.find(x=>x.name===m))minerals.push({name:m,concentration:'',mass:'',resistance:'',rating:0});
              });
            });
            locations.push({
              id:uid(),name:locName,system:'Stanton',type:'planet',parent:'',
              notes:entries.map(e=>e.requiredShip).filter(Boolean).join(' | '),
              minerals,addedAt:Date.now(),updatedAt:Date.now()
            });
          });
          journeys=[];
          dbSave(DB_KEY,locations);
          dbSave(JDB_KEY,journeys);
          renderAtlas();renderMap();renderJourneys();
          alert(`Converted ${locations.length} locations from old format!`);
        }
      } else {
        alert('Unrecognized file format.');
      }
    }catch(err){alert('Failed to parse JSON: '+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
}

// Resize map on window resize
window.addEventListener('resize',()=>{if(document.getElementById('panel-map').classList.contains('active'))renderMap()});
</script>
